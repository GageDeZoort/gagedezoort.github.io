title: Gage DeZoort
description: Please feel free to contact me at jdezoort@princeton.edu.
author: "Gage DeZoort"

theme: minima

domain: gagedezoort.github.io
url: https://gagedezoort.github.io
base_url: /gagedezoort.github.io/

# Minima social links
twitter_username: gdezoort
github_username: gagedezoort
linkedin_username: gagedezoort

# Minima: show excerpts in the frontpage
show_excerpts: true

minima:
  date_format: "%Y-%m-%d"

# Minima: custom header links
header_pages:
  - _pages/frontpage.md
  - _pages/about.md
  - _pages/archive.md

include:
    - _pages

exclude: 
    - .gitignore
    - docker-compose.yml
    - Gemfile
    - Gemfile.lock
    - LICENSE
    - README.md
